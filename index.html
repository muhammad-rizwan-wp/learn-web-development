<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Web Development</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="w-screen h-screen flex items-center justify-start flex-row px-5">
        <div>
            <div class="shadow-lg p-5 rounded-lg border border-white">
                <h1 class="text-3xl font-bold">ToDo App</h1>
                <form class="py-3" id="todo-form">
                    <input type="text" autocomplete="off" class="border px-3 py-2 rounded">
                    <button class="bg-blue-500 text-white px-4 py-2 rounded">Create Item</button>
                </form>
            </div>
            <div class="mt-5">
                <h3 class="text-2xl font-bold">Need Todo</h3>
                <ul class="mt-5" id="todo-list">

                </ul>
            </div>
        </div>
    </div>
</body>

</html>
